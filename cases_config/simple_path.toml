invert = true

[[scene.coordinateSystems]]
name = "input"
axes = [{ name = "y", type = "space" }, { name = "x", type = "space" }]

[[scene.coordinateSystems]]
name = "intermediate"
axes = [{ name = "y", type = "space" }, { name = "x", type = "space" }]

[[scene.coordinateSystems]]
name = "output"
axes = [{ name = "y", type = "space" }, { name = "x", type = "space" }]

[[scene.coordinateTransformations]]
name = "input->intermediate"
input = "input"
output = "intermediate"
type = "identity"

[[scene.coordinateTransformations]]
name = "intermediate->output"
input = "intermediate"
output = "output"
type = "identity"

[conformance]
description = "Transform via an intermediate system."

should_error = false
absolute_tolerance = 1e-6
relative_tolerance = 1e-3

[conformance.source]
name = "input"
coordinates = [[1, 2]]

[conformance.target]
name = "output"
coordinates = [[1, 2]]
