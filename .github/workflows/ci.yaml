name: CI
on: push

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv run prek run --all-files

  write_cases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: ./dev_scripts/write_cases.py
      - run: git diff --exit-code

  test_script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - run: ./transformation_conformance.py --no-exit-code -- dev_scripts/null_dingus.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv build
      - uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-dist-${{ hashFiles('transformation_conformance.py', 'pyproject.toml', 'cases/*') }}
          path: dist/*

  test_sdist:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-dist-${{ hashFiles('transformation_conformance.py', 'pyproject.toml', 'cases/*') }}
          path: dist/*
          fail-on-cache-miss: true
      - run: pip install dist/*.tar.gz
      - run: oztc --no-exit-code -- dev_scripts/null_dingus.py

  test_wheel:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-dist-${{ hashFiles('transformation_conformance.py', 'pyproject.toml', 'cases/*') }}
          path: dist/*
          fail-on-cache-miss: true
      - run: pip install dist/*.whl
      - run: oztc --no-exit-code -- dev_scripts/null_dingus.py
